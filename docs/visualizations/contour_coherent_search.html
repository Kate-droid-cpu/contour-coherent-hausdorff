<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contour-Coherent Hausdorff Search</title>

<style>
  :root {
    --color-background-secondary: #f6f8fa;
    --color-text-primary: #24292f;
    --color-text-secondary: #57606a;
    --color-border-tertiary: #d0d7de;
    --border-radius-md: 10px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 24px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    color: var(--color-text-primary);
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
  }

  canvas {
    display: block;
    width: 660px;
    max-width: 100%;
    height: auto;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    background: #ffffff;
  }

  button {
    padding: 5px 11px;
    border: 1px solid var(--color-border-tertiary);
    border-radius: 6px;
    background: #f6f8fa;
    color: var(--color-text-primary);
    cursor: pointer;
    font: inherit;
  }

  button:hover {
    background: #eef1f4;
  }

  input[type="range"] {
    vertical-align: middle;
  }
</style>
</head>

<body>
<div class="page">

<div style="padding:1rem 0">
  <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1rem">
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem">
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:2px">Iteration</div>
      <div id="sit" style="font-size:22px;font-weight:500;color:var(--color-text-primary)">1 / 40</div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem">
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:2px">Checks done</div>
      <div id="sch" style="font-size:22px;font-weight:500;color:var(--color-text-primary)">0</div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem">
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:2px">Saved vs brute</div>
      <div id="ssv" style="font-size:22px;font-weight:500;color:var(--color-text-primary)">—</div>
    </div>
  </div>

  <canvas id="viz"></canvas>

  <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
    <button id="bp" onclick="hToggle()">Play</button>
    <button onclick="hStep()">Step</button>
    <button onclick="hPrev()">Back</button>
    <button onclick="hReset()">Reset</button>
    <div style="flex:1"></div>
    <label style="font-size:13px;color:var(--color-text-secondary)">Speed</label>
    <input type="range" min="1" max="10" value="6" id="spd" style="width:80px">
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:12px;color:var(--color-text-secondary)">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#D85A30;display:inline-block"></span>Contour 1 (query)</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#378ADD;display:inline-block"></span>Contour 2 (candidates)</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:3px;background:#EF9F27;display:inline-block;border-radius:2px"></span>Start index</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#1D9E75;display:inline-block"></span>Best match</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#9B59B6;display:inline-block"></span>Checking now</span>
  </div>
</div>

<script>
const cv = document.getElementById('viz');
const cx = cv.getContext('2d');

const W = 660, H = 430, N = 40;
const DPR = Math.max(1, window.devicePixelRatio || 1);

// Render the canvas at device-pixel resolution, while keeping the CSS size stable.
// This prevents blurry upscaling on GitHub Pages and HiDPI/Retina displays.
cv.style.width = W + 'px';
cv.style.height = H + 'px';
cv.width = Math.round(W * DPR);
cv.height = Math.round(H * DPR);
cx.setTransform(DPR, 0, 0, DPR, 0, 0);
const CX=330,CY=215;
const PHASE=Math.PI+(8/40)*2*Math.PI;

function makeEll(ox,oy,rx,ry,n,wob,wf,wp,phase){
  wob=wob||0;wf=wf||3;wp=wp||0;phase=phase||0;
  return Array.from({length:n},function(_,i){
    var a=(i/n)*Math.PI*2+phase;
    var w=1+wob*Math.sin(a*wf+wp);
    return{x:ox+rx*w*Math.cos(a),y:oy+ry*w*Math.sin(a)};
  });
}

var c1=makeEll(CX,CY,130,100,N,0,3,0,PHASE);
var c2=makeEll(CX+8,CY-6,152,116,N,0.06,3,1.1,PHASE);

function sim(){
  var fs=[],si=0,hMax=0,tot=0;
  for(var qi=0;qi<N;qi++){
    var a=c1[qi];
    var mSq=Infinity,best=-1,chk=[];
    var goR=false,dirs=2,pos=si,off=0,done=false;
    while(dirs>0&&!done){
      if(pos<0||pos>=N){
        dirs--;goR=!goR;
      } else {
        var b=c2[pos];
        var dSq=(a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y);
        tot++;
        if(dSq<mSq){mSq=dSq;best=pos;}
        var early=qi>0&&mSq<=hMax;
        chk.push(pos);
        fs.push({qi:qi,si:si,pos:pos,best:best,mSq:mSq,hMax:hMax,tot:tot,early:early,chk:chk.slice(),tr:false});
        if(early){done=true;break;}
      }
      if(dirs===2)goR=!goR;
      pos=goR?si+off+1:si-off-1;
      if(!goR||dirs===1)off++;
      if(off>N)break;
    }
    var nm=Math.max(hMax,mSq);
    var ns=best>=0?(best+1)%N:0;
    fs.push({qi:qi,si:si,pos:-1,best:best,mSq:mSq,hMax:nm,tot:tot,early:false,chk:chk.slice(),tr:true,ns:ns});
    hMax=nm;si=ns;
  }
  return fs;
}

var frames=sim();
var bestByIter={};
frames.forEach(function(f){if(f.tr)bestByIter[f.qi]=f.best;});


var fi=0,playing=false,tid=null;

function fillLabel(text,x,y,opts){
  opts = opts || {};
  cx.save();
  cx.font = opts.font || '11px monospace';
  cx.textAlign = opts.align || 'center';
  cx.textBaseline = opts.baseline || 'middle';
  cx.lineJoin = 'round';
  cx.lineWidth = opts.outlineWidth || 3.5;
  cx.strokeStyle = opts.outline || 'rgba(255,255,255,0.92)';
  cx.strokeText(text, x, y);
  cx.fillStyle = opts.fill || '#1f2328';
  cx.fillText(text, x, y);
  cx.restore();
}

function fillStatus(text,x,y,opts){
  opts = opts || {};
  cx.save();
  cx.font = opts.font || '11px monospace';
  cx.textAlign = opts.align || 'left';
  cx.textBaseline = 'alphabetic';
  cx.lineJoin = 'round';
  cx.lineWidth = opts.outlineWidth || 3.5;
  cx.strokeStyle = opts.outline || 'rgba(255,255,255,0.92)';
  cx.strokeText(text, x, y);
  cx.fillStyle = opts.fill || '#1f2328';
  cx.fillText(text, x, y);
  cx.restore();
}

function pth(pts){
  cx.beginPath();cx.moveTo(pts[0].x,pts[0].y);
  for(var i=1;i<pts.length;i++)cx.lineTo(pts[i].x,pts[i].y);
  cx.closePath();
}

function draw(f){
  var dk=window.matchMedia('(prefers-color-scheme: dark)').matches;
  var tc=dk?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.40)';

  // Label collision avoidance for point indices and check-order numbers.
  // Labels are first placed at their natural radial position, then shifted
  // slightly if they would overlap an already drawn label.
  var labelBoxes = [];

  function placeLabel(text, x, y, opts) {
    opts = opts || {};
    var font = opts.font || '600 10px monospace';
    var pad = opts.pad || 3;
    var shifts = opts.shifts || [
      [0, 0],
      [0, -12], [0, 12],
      [14, 0], [-14, 0],
      [14, -10], [-14, -10],
      [14, 10], [-14, 10],
      [0, -24], [0, 24],
      [24, 0], [-24, 0]
    ];

    cx.save();
    cx.font = font;
    var metrics = cx.measureText(String(text));
    cx.restore();

    var w = metrics.width + pad * 2;
    var h = (opts.height || 12) + pad * 2;

    function overlaps(box) {
      for (var i = 0; i < labelBoxes.length; ++i) {
        var b = labelBoxes[i];
        if (!(box.x2 < b.x1 || box.x1 > b.x2 || box.y2 < b.y1 || box.y1 > b.y2)) {
          return true;
        }
      }
      return false;
    }

    var chosenX = x, chosenY = y;
    for (var k = 0; k < shifts.length; ++k) {
      var tx = x + shifts[k][0];
      var ty = y + shifts[k][1];

      // Keep labels inside the canvas with a small margin.
      tx = Math.max(14, Math.min(W - 14, tx));
      ty = Math.max(14, Math.min(H - 14, ty));

      var box = {
        x1: tx - w / 2,
        y1: ty - h / 2,
        x2: tx + w / 2,
        y2: ty + h / 2
      };

      if (!overlaps(box)) {
        chosenX = tx;
        chosenY = ty;
        labelBoxes.push(box);
        break;
      }

      if (k === shifts.length - 1) {
        chosenX = tx;
        chosenY = ty;
        labelBoxes.push(box);
      }
    }

    fillLabel(String(text), chosenX, chosenY, opts);
  }

  cx.clearRect(0,0,W,H);

  pth(c1);cx.strokeStyle='rgba(216,90,48,0.82)';cx.lineWidth=2.4;cx.setLineDash([]);cx.stroke();
  pth(c2);cx.strokeStyle='rgba(55,138,221,0.82)';cx.lineWidth=2.4;cx.stroke();

  for(var i=0;i<f.qi;i++){
    var b=bestByIter[i];
    if(b>=0){
      var aa=c1[i],bb=c2[b];
      cx.beginPath();cx.moveTo(aa.x,aa.y);cx.lineTo(bb.x,bb.y);
      cx.strokeStyle='rgba(29,158,117,0.36)';cx.lineWidth=1.4;cx.setLineDash([]);cx.stroke();
    }
  }

  for(var i=0;i<N;i++){
    var p=c2[i],ci=f.chk.indexOf(i);
    var col=dk?'#2d5f93':'#7BB6E8',r=3.5;
    if(ci>=0&&i!==f.best&&i!==f.pos){col=dk?'#6ea7dd':'#2f7fd1';}
    if(i===f.best){col='#138f68';r=6.2;}
    if(i===f.pos&&!f.tr){col='#8e44ad';r=6.2;}
    if(i===f.si){
      cx.beginPath();cx.arc(p.x,p.y,9,0,Math.PI*2);
      cx.strokeStyle='#f39c12';cx.lineWidth=2.6;cx.setLineDash([]);cx.stroke();
    }
    cx.beginPath();cx.arc(p.x,p.y,r,0,Math.PI*2);cx.fillStyle=col;cx.fill();
    if(ci>=0){
      var dx2=p.x-(CX+8),dy2=p.y-(CY-6),len=Math.sqrt(dx2*dx2+dy2*dy2)||1;
      placeLabel(String(ci+1), p.x+dx2/len*20, p.y+dy2/len*20, {
        font:'700 10px monospace',
        fill:'#111827',
        height:11
      });
    }
  }

  for(var i=0;i<N;i++){
    var p=c1[i],cur=i===f.qi;
    var r=cur?7.5:3.5;
    var col=cur?'#D85A30':(i<f.qi?'rgba(180,60,20,0.88)':'rgba(216,90,48,0.38)');
    cx.beginPath();cx.arc(p.x,p.y,r,0,Math.PI*2);cx.fillStyle=col;cx.fill();
    if(cur){
      var dx2=p.x-CX,dy2=p.y-CY,len=Math.sqrt(dx2*dx2+dy2*dy2)||1;
      // For the orange contour, keep the active-point label lower and mostly inside the contour,
      // so it does not jump onto the blue contour.
      placeLabel('a['+f.qi+']', p.x-dx2/len*22, p.y-dy2/len*22+10, {
        font:'700 12px monospace',
        fill:'#b54708',
        height:13,
        shifts:[[0,0],[0,10],[0,20],[-12,8],[12,8],[-18,16],[18,16],[0,28]]
      });
    }
  }

  if(!f.tr){
    var a=c1[f.qi];
    if(f.best>=0){
      cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(c2[f.best].x,c2[f.best].y);
      cx.strokeStyle='#138f68';cx.lineWidth=2.2;cx.setLineDash([]);cx.stroke();
    }
    if(f.pos>=0&&f.pos<N&&f.pos!==f.best){
      cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(c2[f.pos].x,c2[f.pos].y);
      cx.strokeStyle='rgba(142,68,173,0.72)';cx.lineWidth=1.6;cx.setLineDash([4,3]);cx.stroke();cx.setLineDash([]);
    }
  }

  if(!f.tr&&f.chk.length>0){
    var seq='search: si='+f.si+' → '+f.chk.slice(0,Math.min(f.chk.length,10)).join(', ')+(f.chk.length>10?'…':'');
    fillStatus(seq, W/2, 18, {
      font:'600 11px monospace',
      align:'center',
      fill:'#374151'
    });
  }

  var lbl='iter '+(f.qi+1)+'/'+N+'  a['+f.qi+']  startIndex='+f.si;
  if(!f.tr)lbl+='  pos='+f.pos;
  else lbl+='  best='+f.best+' → next startIndex='+(f.best>=0?(f.best+1)%N:0);
  fillStatus(lbl, 10, H-12, {
    font:'600 11px monospace',
    align:'left',
    fill:'#374151'
  });
  if(f.mSq<1e15){
    fillStatus('minDist='+Math.sqrt(f.mSq).toFixed(1)+'  threshold='+(f.hMax>0?Math.sqrt(f.hMax).toFixed(1):'—'), W/2, H-12, {
      font:'600 11px monospace',
      align:'center',
      fill:'#374151'
    });
  }
  if(f.early){
    fillStatus('early termination ✓', W-10, H-12, {
      font:'700 11px monospace',
      align:'right',
      fill:'#138f68'
    });
  }
  else if(f.tr){
    fillStatus('startIndex → '+(f.best>=0?(f.best+1)%N:0), W-10, H-12, {
      font:'600 11px monospace',
      align:'right',
      fill:'#b45309'
    });
  }
}

function upStats(f){
  document.getElementById('sit').textContent=(f.qi+1)+' / '+N;
  document.getElementById('sch').textContent=f.tot;
  var bf=(f.qi+(f.tr?1:0))*N;
  document.getElementById('ssv').textContent=bf>0?Math.max(0,Math.round((1-f.tot/bf)*100))+'%':'—';
}

function render(){if(fi>=frames.length)fi=frames.length-1;if(fi<0)fi=0;draw(frames[fi]);upStats(frames[fi]);}
function hStep(){if(fi<frames.length-1){fi++;render();}}
function hPrev(){if(fi>0){fi--;render();}}
function hReset(){fi=0;playing=false;clearTimeout(tid);document.getElementById('bp').textContent='Play';render();}
function getDelay(){return 1100-parseInt(document.getElementById('spd').value)*100;}
function loop(){
  if(!playing)return;
  if(fi>=frames.length-1){playing=false;document.getElementById('bp').textContent='Play';return;}
  fi++;render();tid=setTimeout(loop,getDelay());
}
function hToggle(){
  playing=!playing;
  document.getElementById('bp').textContent=playing?'Pause':'Play';
  if(playing)loop();else clearTimeout(tid);
}
render();
</script>

</div>
</body>
</html>
